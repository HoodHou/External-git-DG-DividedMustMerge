name: Publish release assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.2"
        required: true
        default: "v1.0.2"

permissions:
  contents: write

jobs:
  upload:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify release assets
        shell: pwsh
        run: |
          if (-not (Test-Path release\APP_VERSION.txt)) {
            throw "release\APP_VERSION.txt is missing"
          }
          if (-not (Test-Path release\FenJiuBiHe.zip)) {
            throw "release\FenJiuBiHe.zip is missing"
          }
          $version = (Get-Content release\APP_VERSION.txt -Raw).Trim()
          $tagVersion = "${{ inputs.tag }}".TrimStart("v")
          if ($version -ne $tagVersion) {
            throw "APP_VERSION.txt is $version but tag is ${{ inputs.tag }}"
          }

      - name: Ensure GitHub release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.tag }}"
          if (-not (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null)) {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --title $tag --notes "Release $tag"
          }

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" release\APP_VERSION.txt release\FenJiuBiHe.zip --repo $env:GITHUB_REPOSITORY --clobber
